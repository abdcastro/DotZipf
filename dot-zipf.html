<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Zipf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: #08080c; color: #e0e0e8;
    font-family: 'JetBrains Mono', 'Fira Code', monospace; padding: 40px 24px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 28px; }
  .header-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .title { font-size: 30px; font-weight: 700; color: #fff; }
  .title .dot { color: #4ade80; }
  .badge {
    font-size: 11px; color: #333; border: 1px solid #222;
    padding: 2px 8px; border-radius: 4px;
  }
  .subtitle { color: #555; font-size: 13px; margin-top: 6px; }

  .controls { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .tab {
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    font-family: inherit; border: 1px solid #222; border-radius: 6px;
    background: transparent; color: #555; cursor: pointer; transition: all 0.2s;
  }
  .tab.active { border-color: #4ade80; background: rgba(74,222,128,0.07); color: #4ade80; }
  .tab:hover:not(.active) { border-color: #333; color: #888; }

  .encrypt-toggle {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto; font-size: 12px; color: #555;
  }
  .toggle-track {
    width: 36px; height: 20px; border-radius: 10px;
    background: #222; cursor: pointer; position: relative;
    transition: background 0.2s; border: 1px solid #333;
  }
  .toggle-track.on { background: rgba(251,146,60,0.2); border-color: #fb923c; }
  .toggle-knob {
    width: 14px; height: 14px; border-radius: 50%;
    background: #555; position: absolute; top: 2px; left: 2px;
    transition: all 0.2s;
  }
  .toggle-track.on .toggle-knob { left: 18px; background: #fb923c; }
  .encrypt-label { transition: color 0.2s; }
  .encrypt-label.on { color: #fb923c; }

  .key-row {
    margin-bottom: 16px; overflow: hidden;
    max-height: 0; opacity: 0; transition: all 0.3s ease;
  }
  .key-row.visible { max-height: 80px; opacity: 1; }
  .key-input-wrap { position: relative; }
  .key-input {
    width: 100%; background: #111118; border: 1px solid #3a2a1a;
    border-radius: 8px; color: #fb923c; font-size: 14px;
    padding: 10px 16px; font-family: inherit; outline: none;
    letter-spacing: 2px;
  }
  .key-input::placeholder { color: #553a1a; letter-spacing: normal; }
  .key-input:focus { border-color: #fb923c; }
  .key-strength {
    font-size: 9px; color: #444; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .key-strength .val { margin-left: 4px; }
  .key-strength .weak { color: #f87171; }
  .key-strength .ok { color: #facc15; }
  .key-strength .strong { color: #4ade80; }

  textarea {
    width: 100%; min-height: 80px; background: #111118;
    border: 1px solid #1a1a24; border-radius: 8px; color: #fff;
    font-size: 16px; padding: 14px 16px; font-family: inherit;
    resize: vertical; outline: none;
  }
  textarea.decompress-input { font-size: 22px; letter-spacing: 3px; }

  .output-box {
    margin-top: 20px; background: #111118;
    border-radius: 8px; padding: 20px 24px;
  }
  .output-box.compress { border: 1px solid #1a3a1a; }
  .output-box.decompress { border: 1px solid #1a2a3a; }
  .output-box.encrypt-on.compress { border: 1px solid #3a2a1a; }
  .output-box.encrypt-on.decompress { border: 1px solid #3a2a1a; }

  .output-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
  }
  .output-label {
    font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px;
  }
  .output-label .lock { color: #fb923c; margin-left: 6px; }
  .output-label .salt-info { color: #333; font-size: 9px; margin-left: 8px; text-transform: none; }
  .copy-btn {
    background: none; border: 1px solid #333; border-radius: 4px;
    color: #666; font-size: 11px; padding: 3px 10px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .copy-btn.copied { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.09); }

  .output-text { line-height: 1.6; word-break: break-all; user-select: all; }
  .output-text.compress { font-size: 32px; font-weight: 700; color: #4ade80; letter-spacing: 4px; }
  .output-text.compress.encrypted { color: #fb923c; }
  .output-text.decompress { font-size: 16px; font-weight: 400; color: #e0e0e8; }

  .output-loading {
    font-size: 12px; color: #555; padding: 12px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .spinner {
    width: 14px; height: 14px; border: 2px solid #333;
    border-top-color: #fb923c; border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-top: 12px;
  }
  .stat-box {
    background: #111118; border: 1px solid #1a1a24;
    border-radius: 8px; padding: 12px 16px; text-align: center;
  }
  .stat-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 22px; font-weight: 700; color: #fff; margin-top: 4px; }
  .stat-unit { font-size: 10px; color: #444; margin-top: 2px; }

  .bar-container {
    margin-top: 12px; background: #111118; border: 1px solid #1a1a24;
    border-radius: 8px; padding: 14px 20px;
  }
  .bar-label { font-size: 10px; color: #444; margin-bottom: 3px; }
  .bar-track { background: #1a1a24; border-radius: 3px; height: 14px; margin-bottom: 6px; }
  .bar-fill-original { background: #444; height: 100%; width: 100%; border-radius: 3px; }
  .bar-fill-compressed {
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    height: 100%; border-radius: 3px; transition: width 0.3s ease;
  }

  .breakdown { margin-top: 24px; }
  .breakdown-label {
    font-size: 10px; color: #444; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px;
  }
  .breakdown-list { display: flex; flex-direction: column; gap: 4px; }
  .breakdown-row {
    display: grid; grid-template-columns: 1fr 80px 60px 50px;
    align-items: center; border-radius: 6px; padding: 8px 14px; font-size: 13px;
  }
  .breakdown-row.found { background: #0e0e16; border: 1px solid #1a1a24; }
  .breakdown-row.missing { background: #160e10; border: 1px solid #2a1a1a; }

  .error-msg {
    margin-top: 12px; padding: 10px 14px;
    background: #160e10; border: 1px solid #2a1a1a;
    border-radius: 6px; font-size: 11px; color: #f87171;
  }

  .how-it-works {
    margin-top: 28px; padding: 16px 20px;
    background: #0a0a12; border: 1px solid #151520;
    border-radius: 8px; font-size: 12px; color: #444; line-height: 1.8;
  }
  .how-it-works strong { color: #666; }
  .green { color: #4ade80; }
  .how-it-works code { color: #4ade80; }
  .orange { color: #fb923c; }

  .github-link {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 20px; padding: 10px 20px;
    background: transparent; border: 1px solid #222; border-radius: 8px;
    color: #555; font-size: 13px; font-family: inherit;
    text-decoration: none; transition: all 0.2s;
  }
  .github-link:hover { border-color: #444; color: #999; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-row">
      <h1 class="title"><span class="dot">·</span> Dot Zipf</h1>
      <span class="badge" id="baseBadge"></span>
    </div>
    <p class="subtitle">compress english text by mapping each word to a single unicode character using Zipf's law</p>
  </div>

  <div class="controls">
    <button class="tab active" id="tabCompress" onclick="switchMode('compress')">Compress</button>
    <button class="tab" id="tabDecompress" onclick="switchMode('decompress')">Decompress</button>
    <div class="encrypt-toggle">
      <span class="encrypt-label" id="encryptLabel">encrypt</span>
      <div class="toggle-track" id="encryptToggle" onclick="toggleEncrypt()">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>

  <div class="key-row" id="keyRow">
    <div class="key-input-wrap">
      <input type="password" class="key-input" id="keyInput" placeholder="enter encryption key..." maxlength="128" autocomplete="off" spellcheck="false">
      <div class="key-strength" id="keyStrength"></div>
    </div>
  </div>

  <textarea id="input" placeholder="type any english sentence..." spellcheck="false">hello world and hello universe</textarea>

  <div class="output-box compress" id="outputBox">
    <div class="output-header">
      <span class="output-label" id="outputLabel">compressed</span>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()">copy</button>
    </div>
    <div id="outputContent">
      <div class="output-text compress" id="outputText"></div>
    </div>
  </div>

  <div id="statsSection">
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Original</div>
        <div class="stat-value" id="statOriginal">0</div>
        <div class="stat-unit">chars</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Compressed</div>
        <div class="stat-value" id="statCompressed">0</div>
        <div class="stat-unit">chars</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Ratio</div>
        <div class="stat-value" id="statRatio">0%</div>
        <div class="stat-unit">of original</div>
      </div>
    </div>
    <div class="bar-container">
      <div class="bar-label">original</div>
      <div class="bar-track"><div class="bar-fill-original"></div></div>
      <div class="bar-label">compressed</div>
      <div class="bar-track"><div class="bar-fill-compressed" id="barFill" style="width:3%"></div></div>
    </div>
  </div>

  <div class="breakdown" id="breakdownSection">
    <div class="breakdown-label" id="breakdownLabel">word → rank → symbol</div>
    <div class="breakdown-list" id="breakdownList"></div>
  </div>

  <div class="error-msg hidden" id="errorMsg"></div>

  <div class="how-it-works" id="howItWorks"></div>

  <a class="github-link" href="https://github.com/abdcastro/dotzipf" target="_blank" rel="noopener noreferrer">

</div>

function buildCharset() {
  const chars = [];
  for (let i = 0; i < R.length; i += 2)
    for (let cp = R[i]; cp <= R[i + 1]; cp++)
      chars.push(String.fromCodePoint(cp));
  return chars;
}

// ── Crypto primitives ──

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]
  );
  const bits = await crypto.subtle.deriveBits(
    { name: "PBKDF2", salt: salt, iterations: PBKDF2_ITERS, hash: "SHA-256" },
    keyMaterial, 256
  );
  return new Uint8Array(bits); // 32 bytes
}

// SHA-256 based CSPRNG: produces uniform random bytes from a 256-bit key
function createCSPRNG(keyBytes) {
  let counter = 0;
  let buffer = new Uint8Array(0);
  let bufPos = 0;

  return {
    async nextBytes(n) {
      const result = new Uint8Array(n);
      let filled = 0;
      while (filled < n) {
        if (bufPos >= buffer.length) {
          // Generate next block: SHA-256(key || counter)
          const input = new Uint8Array(keyBytes.length + 4);
          input.set(keyBytes);
          input[keyBytes.length] = (counter >> 24) & 0xff;
          input[keyBytes.length + 1] = (counter >> 16) & 0xff;
          input[keyBytes.length + 2] = (counter >> 8) & 0xff;
          input[keyBytes.length + 3] = counter & 0xff;
          const hash = await crypto.subtle.digest("SHA-256", input);
          buffer = new Uint8Array(hash);
          bufPos = 0;
          counter++;
        }
        const take = Math.min(n - filled, buffer.length - bufPos);
        result.set(buffer.subarray(bufPos, bufPos + take), filled);
        filled += take;
        bufPos += take;
      }
      return result;
    },
    // Unbiased random integer in [0, max) using rejection sampling
    async randBelow(max) {
      if (max <= 1) return 0;
      const bitsNeeded = Math.ceil(Math.log2(max));
      const bytesNeeded = Math.ceil(bitsNeeded / 8);
      const mask = (1 << bitsNeeded) - 1;
      while (true) {
        const bytes = await this.nextBytes(bytesNeeded);
        let val = 0;
        for (let i = 0; i < bytesNeeded; i++) val = (val << 8) | bytes[i];
        val &= mask;
        if (val < max) return val;
      }
    }
  };
}

// Fisher-Yates shuffle using CSPRNG
async function shuffleCharset(keyBytes) {
  const arr = CHARSET.slice();
  const rng = createCSPRNG(keyBytes);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = await rng.randBelow(i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Encode salt (16 bytes) as charset characters
// Each char index can hold values 0-9999, so 2 bytes (0-65535) fits in one char
// 16 bytes = 8 pairs = 8 characters
function encodeSalt(saltBytes) {
  let s = "";
  for (let i = 0; i < saltBytes.length; i += 2) {
    const val = (saltBytes[i] << 8) | saltBytes[i + 1];
    s += CHARSET[val % BASE];
  }
  return s;
}

function decodeSalt(saltStr) {
  const bytes = new Uint8Array(SALT_LEN);
  const chars = [...saltStr];
  for (let i = 0; i < chars.length; i++) {
    const idx = CHARSET.indexOf(chars[i]);
    if (idx < 0) return null;
    bytes[i * 2] = (idx >> 8) & 0xff;
    bytes[i * 2 + 1] = idx & 0xff;
  }
  return bytes;
}

function buildReverseLookup(charset) {
  const m = {};
  charset.forEach((c, i) => { if (i < W.length) m[c] = W[i]; });
  return m;
}

function getKeyStrength(key) {
  if (!key) return { label: "", cls: "" };
  const len = key.length;
  const hasUpper = /[A-Z]/.test(key);
  const hasLower = /[a-z]/.test(key);
  const hasDigit = /[0-9]/.test(key);
  const hasSpecial = /[^A-Za-z0-9]/.test(key);
  const pools = (hasUpper ? 26 : 0) + (hasLower ? 26 : 0) + (hasDigit ? 10 : 0) + (hasSpecial ? 32 : 0);
  const entropy = Math.floor(len * Math.log2(Math.max(pools, 2)));
  if (entropy < 28) return { label: entropy + " bits \u2014 weak", cls: "weak" };
  if (entropy < 56) return { label: entropy + " bits \u2014 moderate", cls: "ok" };
  return { label: entropy + " bits \u2014 strong", cls: "strong" };
}

// ── Init ──
document.getElementById("baseBadge").textContent = "base-" + BASE.toLocaleString();

function updateHowItWorks(cs) {
  const charset = cs || CHARSET;
  document.getElementById("howItWorks").innerHTML =
    '<strong>How it works</strong><br>' +
    BASE.toLocaleString() + ' printable Unicode characters mapped 1:1 to the ' +
    W.length.toLocaleString() + ' most common English words. ' +
    'Every word is exactly <strong class="green">one character</strong>. N words = N characters.' +
    (encryptEnabled
      ? ' <strong class="orange">Encrypt mode</strong> uses PBKDF2 (' + PBKDF2_ITERS.toLocaleString() +
        ' iterations) + SHA-256 CSPRNG to shuffle the mapping. A random 128-bit salt per message prevents dictionary attacks. ' +
        'The first ' + SALT_CHARS + ' characters of output are the salt.'
      : ' "the" = <code>' + escHtml(charset[0]) + '</code>, "hello" = <code>' +
        escHtml(charset[1895]) + '</code>, "world" = <code>' + escHtml(charset[129]) + '</code>.');
}
updateHowItWorks();

function toggleEncrypt() {
  encryptEnabled = !encryptEnabled;
  document.getElementById("encryptToggle").classList.toggle("on", encryptEnabled);
  document.getElementById("encryptLabel").classList.toggle("on", encryptEnabled);
  document.getElementById("keyRow").classList.toggle("visible", encryptEnabled);
  if (encryptEnabled) document.getElementById("keyInput").focus();
  scheduleUpdate();
  updateHowItWorks();
}

function switchMode(newMode) {
  if (newMode === mode) return;
  const prevOutput = currentOutput;
  mode = newMode;
  document.getElementById("tabCompress").classList.toggle("active", mode === "compress");
  document.getElementById("tabDecompress").classList.toggle("active", mode === "decompress");
  const inp = document.getElementById("input");
  inp.value = prevOutput || "";
  inp.placeholder = mode === "compress" ? "type any english sentence..." : "paste compressed symbols here...";
  inp.className = mode === "decompress" ? "decompress-input" : "";
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(update, encryptEnabled ? 50 : 0);
}

async function update() {
  const input = document.getElementById("input").value;
  const key = document.getElementById("keyInput").value.trim();

  // Key strength
  if (encryptEnabled) {
    const ks = getKeyStrength(key);
    document.getElementById("keyStrength").innerHTML = ks.label
      ? 'entropy: <span class="val ' + ks.cls + '">' + ks.label + '</span>' : '';
  } else {
    document.getElementById("keyStrength").innerHTML = '';
  }

  if (encryptEnabled && !key) {
    showMinimal("enter a key to " + (mode === "compress" ? "encrypt" : "decrypt"));
    return;
  }

  if (mode === "compress") {
    await doCompress(input, key);
  } else {
    await doDecompress(input, key);
  }
}

function showMinimal(msg) {
  const outputBox = document.getElementById("outputBox");
  const outputText = document.getElementById("outputText");
  const outputContent = document.getElementById("outputContent");
  outputBox.classList.remove("hidden");
  outputContent.innerHTML = '<div class="output-text decompress" style="color:#555;font-style:italic;font-size:13px">' + msg + '</div>';
  document.getElementById("outputLabel").innerHTML = encryptEnabled ? "encrypted" : "compressed";
  document.getElementById("statsSection").classList.add("hidden");
  document.getElementById("breakdownSection").classList.add("hidden");
  document.getElementById("errorMsg").classList.add("hidden");
  currentOutput = "";
}

function showLoading() {
  document.getElementById("outputContent").innerHTML =
    '<div class="output-loading"><div class="spinner"></div>deriving key (' + PBKDF2_ITERS.toLocaleString() + ' iterations)...</div>';
  document.getElementById("outputBox").classList.remove("hidden");
}

async function doCompress(text, key) {
  const words = text.toLowerCase().trim().split(/\s+/).filter(Boolean);
  if (!words.length) { showMinimal("type something..."); return; }

  let cs = CHARSET;
  let saltStr = "";

  if (encryptEnabled && key) {
    showLoading();
    await new Promise(r => setTimeout(r, 10)); // let spinner render
    const salt = crypto.getRandomValues(new Uint8Array(SALT_LEN));
    const derivedKey = await deriveKey(key, salt);
    cs = await shuffleCharset(derivedKey);
    saltStr = encodeSalt(salt);
  }

  const encoded = [];
  let unknowns = 0;
  for (const w of words) {
    const rank = wordToRank[w];
    if (rank !== undefined) {
      encoded.push({ word: w, rank, symbol: cs[rank], found: true });
    } else {
      unknowns++;
      encoded.push({ word: w, rank: null, symbol: null, found: false });
    }
  }

  const found = encoded.filter(e => e.found);
  const payload = found.map(e => e.symbol).join("");
  const compressed = saltStr + payload;
  const original = words.join(" ");
  const ratio = original.length > 0 ? ((compressed.length / original.length) * 100).toFixed(1) : "0";
  currentOutput = compressed;

  const encClass = encryptEnabled ? " encrypt-on" : "";
  const lockIcon = encryptEnabled ? '<span class="lock">&#128274;</span>' : "";
  const saltInfo = encryptEnabled ? '<span class="salt-info">(' + SALT_CHARS + ' salt + ' + payload.length + ' data)</span>' : "";

  const outputBox = document.getElementById("outputBox");
  outputBox.className = "output-box compress" + encClass;
  document.getElementById("outputLabel").innerHTML = (encryptEnabled ? "encrypted" : "compressed") + lockIcon + saltInfo;
  document.getElementById("outputContent").innerHTML =
    '<div class="output-text compress' + (encryptEnabled ? " encrypted" : "") + '">' + escHtml(compressed) + '</div>';
  document.getElementById("copyBtn").textContent = "copy";
  document.getElementById("copyBtn").classList.remove("copied");

  document.getElementById("statsSection").classList.remove("hidden");
  document.getElementById("statOriginal").textContent = original.length;
  document.getElementById("statCompressed").textContent = compressed.length;
  document.getElementById("statRatio").textContent = ratio + "%";
  document.getElementById("barFill").style.width = Math.min(100, Math.max(3, parseFloat(ratio))) + "%";

  const symColor = encryptEnabled ? "#fb923c" : "#4ade80";
  document.getElementById("breakdownLabel").textContent = "word \u2192 rank \u2192 symbol";
  document.getElementById("breakdownList").innerHTML = encoded.map(e => {
    const cls = e.found ? "found" : "missing";
    const rank = e.found ? "#" + e.rank.toLocaleString() : "unknown";
    const rankColor = e.found ? "#3b82f6" : "#f87171";
    const sym = e.found ? e.symbol : "\u2014";
    const info = e.found ? e.word.length + "\u21921" : "";
    return '<div class="breakdown-row ' + cls + '">' +
      '<span style="color:#ccc;font-weight:500">' + escHtml(e.word) + '</span>' +
      '<span style="color:' + rankColor + ';font-size:11px">' + rank + '</span>' +
      '<span style="color:' + symColor + ';font-size:22px;font-weight:700;text-align:center">' + escHtml(sym) + '</span>' +
      '<span style="color:#333;font-size:10px;text-align:right">' + info + '</span></div>';
  }).join("");
  document.getElementById("breakdownSection").classList.toggle("hidden", encryptEnabled);

  if (unknowns > 0) {
    document.getElementById("errorMsg").classList.remove("hidden");
    document.getElementById("errorMsg").textContent = unknowns + " word" + (unknowns > 1 ? "s" : "") + " not recognized";
  } else { document.getElementById("errorMsg").classList.add("hidden"); }

  updateHowItWorks(cs);
}

async function doDecompress(text, key) {
  const allChars = [...text.trim()];
  if (!allChars.length) { showMinimal("paste something..."); return; }

  let cs = CHARSET;
  let dataChars = allChars;

  if (encryptEnabled && key) {
    if (allChars.length <= SALT_CHARS) {
      showMinimal("input too short \u2014 needs " + SALT_CHARS + " salt chars + data");
      return;
    }
    showLoading();
    await new Promise(r => setTimeout(r, 10));
    const saltChars = allChars.slice(0, SALT_CHARS).join("");
    dataChars = allChars.slice(SALT_CHARS);
    const salt = decodeSalt(saltChars);
    if (!salt) { showMinimal("invalid salt in input"); return; }
    const derivedKey = await deriveKey(key, salt);
    cs = await shuffleCharset(derivedKey);
  }

  const reverseMap = buildReverseLookup(cs);
  const decoded = [];
  let unknowns = 0;
  for (const c of dataChars) {
    const word = reverseMap[c];
    if (word) {
      decoded.push({ char: c, word, rank: wordToRank[word], found: true });
    } else {
      unknowns++;
      decoded.push({ char: c, word: null, rank: null, found: false });
    }
  }
  const found = decoded.filter(e => e.found);
  const decompressed = found.map(e => e.word).join(" ");
  currentOutput = decompressed;

  const encClass = encryptEnabled ? " encrypt-on" : "";
  const lockIcon = encryptEnabled ? '<span class="lock">&#128275;</span>' : "";

  const outputBox = document.getElementById("outputBox");
  outputBox.className = "output-box decompress" + encClass;
  document.getElementById("outputLabel").innerHTML = (encryptEnabled ? "decrypted" : "decompressed") + lockIcon;
  document.getElementById("outputContent").innerHTML =
    '<div class="output-text decompress">' + escHtml(decompressed) + '</div>';
  document.getElementById("copyBtn").textContent = "copy";
  document.getElementById("copyBtn").classList.remove("copied");

  document.getElementById("statsSection").classList.add("hidden");

  const charColor = encryptEnabled ? "#fb923c" : "#4ade80";
  document.getElementById("breakdownLabel").textContent = "symbol \u2192 rank \u2192 word";
  document.getElementById("breakdownList").innerHTML = decoded.map(e => {
    const cls = e.found ? "found" : "missing";
    const rank = e.found ? "#" + e.rank.toLocaleString() : "unknown";
    const rankColor = e.found ? "#3b82f6" : "#f87171";
    const word = e.found ? e.word : "\u2014";
    const info = e.found ? "1\u2192" + e.word.length : "";
    return '<div class="breakdown-row ' + cls + '">' +
      '<span style="color:' + charColor + ';font-weight:700;font-size:20px">' + escHtml(e.char) + '</span>' +
      '<span style="color:' + rankColor + ';font-size:11px">' + rank + '</span>' +
      '<span style="color:#ccc;font-size:13px;font-weight:500;text-align:center">' + escHtml(word) + '</span>' +
      '<span style="color:#333;font-size:10px;text-align:right">' + info + '</span></div>';
  }).join("");
  document.getElementById("breakdownSection").classList.toggle("hidden", encryptEnabled);

  if (unknowns > 0) {
    document.getElementById("errorMsg").classList.remove("hidden");
    document.getElementById("errorMsg").textContent = unknowns + " symbol" + (unknowns > 1 ? "s" : "") +
      " not recognized" + (encryptEnabled ? " \u2014 wrong key?" : "");
  } else { document.getElementById("errorMsg").classList.add("hidden"); }

  updateHowItWorks(cs);
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function copyOutput() {
  if (!currentOutput) return;
  const ta = document.createElement("textarea");
  ta.value = currentOutput;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  const btn = document.getElementById("copyBtn");
  btn.textContent = "copied!";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("copied"); }, 1500);
}

document.getElementById("input").addEventListener("input", scheduleUpdate);
document.getElementById("keyInput").addEventListener("input", scheduleUpdate);
update();
</script>
